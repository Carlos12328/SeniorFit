<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Idosos | SeniorFit</title><link rel="stylesheet" href="/css/style.css"></head><body><div id="navbar"></div><main class="container"><section class="card" data-permissao="idosos:editar"><h1>Cadastro de Idosos</h1><p class="subtitulo">Idosos podem ser cadastrados por administradores e profissionais. O vínculo com acompanhante é usado para impedir vazamento de dados.</p><div id="msgIdosos" class="alerta"></div><form id="formIdoso" class="form-grid"><div><label for="nomeIdoso">Nome</label><input id="nomeIdoso" data-test="nome-idoso"></div><div><label for="idadeIdoso">Idade</label><input id="idadeIdoso" data-test="idade-idoso" type="number" min="1" max="130"></div><div class="span-2"><label for="acompanhanteIdoso">Acompanhante</label><select id="acompanhanteIdoso" data-test="acompanhante-idoso"><option value="">Sem vínculo inicial</option></select></div><div class="span-2 actions"><button data-test="btn-salvar-idoso" type="submit">Salvar idoso</button></div></form></section><section class="card"><h2>Idosos cadastrados</h2><table><thead><tr><th>Nome</th><th>Idade</th><th>Acompanhante</th></tr></thead><tbody id="tbodyIdosos"></tbody></table></section></main><script src="/js/api.js"></script><script src="/js/idosos.js"></script></body></html>
