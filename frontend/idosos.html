<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Idosos | SeniorFit</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div id="navbar"></div>

<!-- Modal de edição -->
<div id="modalEdicaoIdoso" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:100; align-items:center; justify-content:center;">
  <div style="background:#fff; border-radius:16px; padding:32px; width:100%; max-width:420px; box-shadow:0 8px 30px rgba(0,0,0,.15);">
    <h2 style="margin-top:0;">Editar idoso</h2>
    <div id="msgEdicaoIdoso" class="alerta"></div>
    <label for="editNomeIdoso">Nome</label>
    <input id="editNomeIdoso" type="text" placeholder="Nome completo">
    <label for="editIdadeIdoso" style="margin-top:12px;">Idade</label>
    <input id="editIdadeIdoso" type="number" min="1" max="130" placeholder="Idade">
    <label for="editAcompanhanteIdoso" style="margin-top:12px;">Acompanhante</label>
    <select id="editAcompanhanteIdoso">
      <option value="">Sem acompanhante</option>
    </select>
    <div class="actions" style="margin-top:20px;">
      <button onclick="salvarEdicaoIdoso()">Salvar</button>
      <button onclick="fecharEdicaoIdoso()" class="secundario">Cancelar</button>
    </div>
  </div>
</div>

<main class="container">

  <section class="card" data-permissao="idosos:editar">
    <h1>Cadastro de Idosos</h1>
    <p class="subtitulo">
      Idosos podem ser cadastrados por administradores e profissionais.
      O vínculo com acompanhante controla o acesso aos dados.
    </p>

    <div id="msgIdosos" class="alerta"></div>

    <form id="formIdoso" class="form-grid">
      <div>
        <label for="nomeIdoso">Nome</label>
        <input
          id="nomeIdoso"
          data-test="nome-idoso"
          type="text"
          placeholder="Nome completo do idoso"
        >
      </div>

      <div>
        <label for="idadeIdoso">Idade</label>
        <input
          id="idadeIdoso"
          data-test="idade-idoso"
          type="number"
          min="1"
          max="130"
          placeholder="Ex: 75"
        >
      </div>

      <div class="span-2">
        <label for="acompanhanteIdoso">Acompanhante (opcional)</label>
        <select id="acompanhanteIdoso" data-test="acompanhante-idoso">
          <option value="">Sem vínculo inicial</option>
        </select>
      </div>

      <div class="span-2 actions">
        <button data-test="btn-salvar-idoso" type="submit">Salvar idoso</button>
      </div>
    </form>
  </section>

  <section class="card">
    <h2>Idosos cadastrados</h2>
    <table>
      <thead>
        <tr>
          <th>Nome</th>
          <th>Idade</th>
          <th>Acompanhante</th>
          <th data-permissao="idosos:editar">Ações</th>
        </tr>
      </thead>
      <tbody id="tbodyIdosos">
        <tr><td colspan="4" class="small">Carregando...</td></tr>
      </tbody>
    </table>
  </section>

</main>

<script src="/js/api.js"></script>
<script src="/js/idosos.js"></script>
</body>
</html>
